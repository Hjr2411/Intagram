<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        .container {
            display: flex;
            max-width: 1000px;
            width: 100%;
            gap: 40px;
            padding: 20px;
        }

        .left-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .phone-mockup {
            width: 280px;
            height: 580px;
            background: #000;
            border: 12px solid #222;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .phone-mockup::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
        }

        .right-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #833ab4 0%, #fd1d1d 50%, #fcaf45 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #a0a0a0;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .form-group input::placeholder {
            color: #666;
        }

        .btn-entrar {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #833ab4 0%, #fd1d1d 50%, #fcaf45 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-entrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(253, 29, 29, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider span {
            padding: 0 15px;
            color: #a0a0a0;
            font-size: 13px;
        }

        .footer-links {
            margin-top: 30px;
            text-align: center;
            font-size: 13px;
        }

        .footer-links a {
            color: #a0a0a0;
            text-decoration: none;
            transition: color 0.3s ease;
            margin: 0 10px;
        }

        .footer-links a:hover {
            color: #fff;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                gap: 30px;
            }

            .left-section {
                display: none;
            }

            .logo {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-section">
            <div class="phone-mockup">
                <div class="phone-screen">
                    Instagram
                </div>
            </div>
        </div>

        <div class="right-section">
            <div class="logo">Instagram</div>

            <form>
                <div class="form-group">
                    <label for="usuario">Usuário ou Email</label>
                    <input type="text" id="usuario" placeholder="Digite seu usuário ou email" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                </div>

                <!-- OPÇÃO 1: Usar um link (recomendado) -->
                <a href="conta_bloqueada.html" class="btn-entrar" style="text-decoration: none; display: inline-block; text-align: center;">
                    Entrar
                </a>

                <!-- OPÇÃO 2: Usar um botão com onclick (alternativa) -->
                <!-- <button type="button" class="btn-entrar" onclick="window.location.href='conta_bloqueada.html';">
                    Entrar
                </button> -->
            </form>

            <div class="divider">
                <span>ou</span>
            </div>

            <button class="btn-entrar" style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);">
                Entrar com Facebook
            </button>

            <div class="footer-links">
                <a href="#">Esqueceu a senha?</a>
            </div>

            <div style="text-align: center; margin-top: 30px; font-size: 13px; color: #a0a0a0;">
                Não tem uma conta? <a href="#" style="color: #fff; font-weight: 600;">Cadastre-se</a>
            </div>
        </div>
    </div>
</body>
</html>
